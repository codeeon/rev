name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-monorepo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build engine-data package
        run: pnpm turbo run build --filter=@workspace/engine-data

      - name: Build base-ui package
        run: pnpm turbo run build --filter=@workspace/base-ui

      - name: Lint web
        run: pnpm turbo run lint --filter=web

      - name: Typecheck web
        run: pnpm turbo run typecheck --filter=web

      - name: Test web engine
        run: pnpm turbo run test:engine --filter=web

      - name: Build web
        run: pnpm turbo run build --filter=web
